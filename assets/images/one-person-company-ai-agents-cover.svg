<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101828"/>
      <stop offset="55%" stop-color="#18254a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000" flood-opacity="0.26"/>
    </filter>
  </defs>
  <rect width="1600" height="1600" fill="url(#bg)"/>
  <circle cx="1280" cy="250" r="310" fill="#7c3aed" opacity="0.22"/>
  <circle cx="270" cy="1320" r="360" fill="#06b6d4" opacity="0.18"/>

  <text x="130" y="170" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#f9fafb">One Person + AI Agents</text>
  <text x="130" y="235" font-family="Inter, Arial, sans-serif" font-size="28" fill="#d0d5dd">A company as a workflow of judgment, execution, feedback, and learning</text>

  <g filter="url(#shadow)">
    <rect x="140" y="470" width="350" height="310" rx="36" fill="url(#card)" stroke="#fff" stroke-opacity="0.18"/>
    <circle cx="315" cy="580" r="62" fill="#f8fafc"/>
    <rect x="260" y="660" width="110" height="42" rx="21" fill="#f8fafc" opacity="0.9"/>
    <text x="315" y="735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800" fill="#f9fafb">Human</text>
    <text x="315" y="775" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#d0d5dd">judgment / taste / review</text>
  </g>

  <g stroke="#98a2b3" stroke-width="4" stroke-dasharray="12 14" opacity="0.72" fill="none">
    <path d="M520 620 C615 530, 690 500, 790 500"/>
    <path d="M520 625 C625 625, 690 625, 790 625"/>
    <path d="M520 630 C615 725, 690 765, 790 780"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <g filter="url(#shadow)">
      <rect x="810" y="420" width="280" height="170" rx="30" fill="#155eef" opacity="0.94"/>
      <text x="950" y="500" text-anchor="middle" font-size="31" font-weight="800" fill="#fff">Research</text>
      <text x="950" y="542" text-anchor="middle" font-size="21" fill="#dbeafe">signals → plans</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="1160" y="420" width="280" height="170" rx="30" fill="#12b76a" opacity="0.92"/>
      <text x="1300" y="500" text-anchor="middle" font-size="31" font-weight="800" fill="#fff">Product</text>
      <text x="1300" y="542" text-anchor="middle" font-size="21" fill="#dcfce7">choices → specs</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="810" y="700" width="280" height="170" rx="30" fill="#f79009" opacity="0.94"/>
      <text x="950" y="780" text-anchor="middle" font-size="31" font-weight="800" fill="#fff">Build</text>
      <text x="950" y="822" text-anchor="middle" font-size="21" fill="#ffedd5">code → delivery</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="1160" y="700" width="280" height="170" rx="30" fill="#7a5af8" opacity="0.94"/>
      <text x="1300" y="780" text-anchor="middle" font-size="31" font-weight="800" fill="#fff">Review</text>
      <text x="1300" y="822" text-anchor="middle" font-size="21" fill="#ede9fe">feedback → learning</text>
    </g>
  </g>

  <g stroke="#d0d5dd" stroke-width="4" fill="none" opacity="0.7">
    <path d="M1100 505 H1145"/>
    <path d="M1300 605 V685"/>
    <path d="M1145 785 H1105"/>
    <path d="M950 685 V605"/>
  </g>

  <rect x="130" y="1080" width="1340" height="230" rx="42" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="180" y="1165" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#f9fafb">AI makes the one-person company</text>
  <text x="180" y="1220" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#f9fafb">imaginative again</text>
  <text x="180" y="1285" font-family="Inter, Arial, sans-serif" font-size="25" fill="#d0d5dd">Not more output at any cost — more effective decisions, verified faster.</text>
</svg>
