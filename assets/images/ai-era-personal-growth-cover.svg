<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">From answers to know-how</title>
  <desc id="desc">A simple diagram showing AI answers becoming experiments, results, and reusable know-how.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="150" r="260" fill="#38bdf8" opacity="0.12"/>
  <circle cx="240" cy="760" r="320" fill="#a78bfa" opacity="0.12"/>
  <g filter="url(#shadow)">
    <rect x="120" y="150" width="1360" height="600" rx="42" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18"/>
  </g>
  <text x="160" y="245" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="750">AI makes answers cheap.</text>
  <text x="160" y="315" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30">Personal growth still comes from problems, experiments, results, and review.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(170 430)">
      <rect width="250" height="150" rx="28" fill="#0ea5e9" opacity="0.95"/>
      <text x="125" y="70" text-anchor="middle" fill="#ffffff" font-size="31" font-weight="720">Answer</text>
      <text x="125" y="110" text-anchor="middle" fill="#e0f2fe" font-size="20">fast and abundant</text>
    </g>
    <path d="M450 505 H560" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>
    <path d="M548 482 L580 505 L548 528" fill="none" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(600 430)">
      <rect width="250" height="150" rx="28" fill="#8b5cf6" opacity="0.95"/>
      <text x="125" y="70" text-anchor="middle" fill="#ffffff" font-size="31" font-weight="720">Experiment</text>
      <text x="125" y="110" text-anchor="middle" fill="#ede9fe" font-size="20">try in context</text>
    </g>
    <path d="M880 505 H990" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>
    <path d="M978 482 L1010 505 L978 528" fill="none" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(1030 430)">
      <rect width="250" height="150" rx="28" fill="#10b981" opacity="0.95"/>
      <text x="125" y="70" text-anchor="middle" fill="#ffffff" font-size="31" font-weight="720">Know-how</text>
      <text x="125" y="110" text-anchor="middle" fill="#d1fae5" font-size="20">reusable judgment</text>
    </g>
  </g>
  <text x="160" y="680" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="650">Do not only collect better answers. Build a library of solved problems.</text>
</svg>
