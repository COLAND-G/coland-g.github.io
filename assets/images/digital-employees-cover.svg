<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#10233f"/>
      <stop offset="1" stop-color="#183b55"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="55"/></filter>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe8ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="230" cy="430" r="310" fill="#2978ff" opacity="0.28" filter="url(#blur)"/>
  <circle cx="1280" cy="180" r="270" fill="#1bd0ad" opacity="0.22" filter="url(#blur)"/>
  <circle cx="1260" cy="760" r="300" fill="#9a5cff" opacity="0.22" filter="url(#blur)"/>

  <text x="110" y="190" fill="#fff" font-size="88" font-weight="700" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif">Digital Employees</text>
  <text x="115" y="270" fill="#dceaff" font-size="42" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif">The hard part is not replacing people.</text>
  <text x="115" y="330" fill="#dceaff" font-size="42" font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif">It is building reliable collaboration infrastructure.</text>

  <g stroke="#9bb6ff" stroke-width="6" stroke-linecap="round" opacity="0.9">
